<!DOCTYPE html>
<html>
    <head>
        <title>Формы</title>
    </head>

    <body>
        <main>
            <section>
                <form action="#">
                    <div>
                        <!-- label - строковый объект, текстовое поле -->
                        <!-- input - создаёт строковый объект для ввода информации Насчитывает 22 модификации-->
                        <!-- name - нужен для каждого поля которое будет обрабатывать форма, по этому полю будут передаваться значения на backend-->
                        <label for="email">Ведите почту</label>
                        <input type="email", placeholder="Email пользователя", id="email", name="email">

                        <label for="password">Введите пароль</label>
                        <input type="password", placeholder="Пароль пользователя", id="password", name="password">

                        <label for="date">Введите дату рождения</label>
                        <input type="date", placeholder="Дата рождения", id="date", name="date">

                        <label for="text">Введите сообщение</label>
                        <input type="text", placeholder="Текст пользователя", id="text", name="text">

                        <button type="submit">Отправить</button>
                        <button type="reset">Очистить форму</button>
                        <button type="button">Просто кнопка для привязывания к какой-то логике</button>
                    </div>
            
                    <div>
                        <!-- Чекбокс выбираем или нет -->
                        <label for="agree">Согласен с обработкой данных</label>
                        <input type="checkbox" name="agree" id="agree">
                    </div>

                    <div>
                        <!-- Группа чекбоксов выбираем только что-то одно -->
                        <label for="1">Выбор 1</label>
                        <input type="radio" name="choice" id="choice_1", value="1">
                        <label for="2">Выбор 2</label>
                        <input type="radio" name="choice" id="choice_2", value="2">
                    </div>

                    <div>
                        <!-- Список -->
                        <label for="select_choice">Выбор</label>
                        <select name="select_choice" id="select_choice">
                            <option value="1">Выбор1</option>
                            <option value="2">Выбор2</option>
                            <option value="3">выбор3</option>
                        </select>
                    </div>

                    <div>
                        <!-- Слайдер -->
                        <label for="range_volume">Громкость</label>
                        <input type="range" name="range_volume" id="range_volume">
                    </div>

                    <div>
                        <!-- Многострочный ввод текста -->
                        <label for="text_area">Текстовое поле</label>
                        <textarea name="text_area" id="text_area"></textarea>
                    </div>
                 </form>
            </section>
        </main>
    </body>
</html>
