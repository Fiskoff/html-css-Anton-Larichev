<!DOCTYPE html>
<html>

<head>
    <title>Основы HTML</title>
</head>

<body>
    <h1>Заголовок 1</h1>
    <h2>Заголовок 2</h2>

    <p>Параграф - содержит текст<br /> - Отвечает за перенос текста на другую строку</p>

    <ul>

        <li>Не упорядоченный список 2</li>
        <li>Не упорядоченный список 3</li>

    <ol>
        <li>Упорядоченный список 1</li>
        <li>Упорядоченный список 2</li>
        <li>Упорядоченный список 3</li>
    </ol>

    <a href="Куда ведёт ссылка" target="_blank">Ссылка</a>
    <img src="Путь к картинке" alt="Описание того что находится на картинке" />

</html>
