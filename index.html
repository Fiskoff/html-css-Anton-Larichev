<!DOCTYPE html>
<html>
    <head>
        <title>Таблицы</title>
    </head>

    <body>
        <main>
            <section>
                <table> <!-- Таблица -->
                    <tr> <!-- Строка -->
                        <th></th><!-- Заголовок -->
                    </tr>
                    <tr>
                        <td><!-- Столбец(ячейка) -->
                            контент
                        </td>
                    </tr>
                </table>
            </section>

            <section>
                <table>
                    <caption>Структура расходов</caption>
                    <thead>
                        <tr>
                            <th rowspan="2">Статья</th>
                            <th colspan="2">Сумма</th>
                        </tr>
                        <tr>
                            <th>Рубли</th>
                            <th>Доллары</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr> 
                            <td>Зарплата</td>
                            <td>100 000</td>
                            <td>8 500</td>
                        </tr>
                        <tr> 
                            <td>Сервисы</td>
                            <td>30 000</td>
                            <td>400</td>
                        </tr>
                    </tbody>
                    <tfoot>
                        <td>Итог</td>
                        <td>130 000</td>
                        <td>8900</td>
                    </tfoot>
                </table>
            </section>

            <section>
                <table>
                    <caption>Таблица расходов и доходов</caption>
                    <thead>
                        <tr>
                            <th>Год</th>
                            <th colspan="2">2023</th>
                            <th colspan="2">2024</th>
                        </tr>
                        <tr>
                            <td>Полугодие</td>
                            <td>1</td>
                            <td>2</td>
                            <td>1</td>
                            <td>2</td>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Доход</td>
                            <td>1500$</td>
                            <td>1800$</td>
                            <td>2000$</td>
                            <td>3000$</td>
                        </tr>
                        <tr>
                            <td>Расход</td>
                            <td>-500$</td>
                            <td>-600$</td>
                            <td>-700$</td>
                            <td>-1000$</td>
                        </tr>
                    </tbody>
                    <tfoot>
                        <tr>
                            <td>Итог</td>
                            <td>1000$</td>
                            <td>1200$</td>
                            <td>1300$</td>
                            <td>2000$</td>
                        </tr>
                    </tfoot>
                </table>
            </section>
        </main>
    </body>
</html>
